version: '3.8'

services:
  mongo1:
    hostname: mongo1
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - data1:/data/db
      - ./scripts/start-mongo.sh:/start-mongo.sh
    environment:
      - REPL_SET_NAME=data1
      - PORT=27017
    command: ["/start-mongo.sh"]
    healthcheck:
      test: "timeout 5 mongosh --eval 'db.adminCommand(\"ping\")'"
      interval: 10s
      timeout: 10s
      retries: 5

  mongo2:
    hostname: mongo2
    image: mongo:latest
    ports:
      - "27018:27018"
    volumes:
      - data2:/data/db
      - ./scripts/start-mongo.sh:/start-mongo.sh
    environment:
      - REPL_SET_NAME=data2
      - PORT=27018
    command: ["/start-mongo.sh"]
    healthcheck:
      test: "timeout 5 mongosh --port 27018 --eval 'db.adminCommand(\"ping\")'"
      interval: 10s
      timeout: 10s
      retries: 5

  mongotest:
    hostname: mongotest
    image: mongo:latest
    ports:
      - "27019:27019"
    volumes:
      - datatest:/data/db
      - ./scripts/start-mongo.sh:/start-mongo.sh
    environment:
      - REPL_SET_NAME=datatest
      - PORT=27019
    command: ["/start-mongo.sh"]
    healthcheck:
      test: "timeout 5 mongosh --port 27019 --eval 'db.adminCommand(\"ping\")'"
      interval: 10s
      timeout: 10s
      retries: 5

  dsync:
    deploy:
      replicas: 0
    build: .
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
    volumes:
      - ./scripts/wait-for-mongo.sh:/wait-for-mongo.sh
    command: ["/bin/bash", "-c", "./dsync -s mongodb://mongo1:27017/?replicaSet=data1 -d mongodb://mongo2:27018/?replicaSet=data2 -m mongodb://mongo1:27017/?replicaSet=data1 --verbosity INFO"]

  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.5
    ports:
    - 8080:8080
    - 50051:50051
    volumes:
    - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_API_BASED_MODULES: 'true'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
      CLUSTER_HOSTNAME: 'node1'

volumes:
  data1:
  data2:
  datatest:
  weaviate_data:
